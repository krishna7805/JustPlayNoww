<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🃏 Memory Match</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0a1a;
      color: #f1f1f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(236,72,153,0.12), transparent 70%);
      pointer-events: none;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .controls {
      display: flex;
      gap: 0.6rem;
      margin: 1rem 0;
      flex-wrap: wrap;
      justify-content: center;
    }

    select, button {
      padding: 0.5rem 1rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      color: #e0e0e0;
      transition: all 0.3s ease;
    }

    button:hover, select:hover {
      background: rgba(236,72,153,0.2);
      border-color: rgba(236,72,153,0.4);
    }

    .stats {
      display: flex;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #a1a1b5;
    }

    .stats span span {
      color: #ec4899;
      font-weight: 700;
    }

    .board {
      display: grid;
      gap: 10px;
      padding: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      max-width: 500px;
      width: 100%;
    }

    .board.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .board.cols-5 { grid-template-columns: repeat(5, 1fr); }
    .board.cols-6 { grid-template-columns: repeat(6, 1fr); }

    .card {
      aspect-ratio: 1;
      perspective: 600px;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card.matched {
      animation: match-pop 0.5s ease;
    }

    @keyframes match-pop {
      0% { transform: scale(1); }
      30% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .card-face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      backface-visibility: hidden;
      font-size: 2rem;
    }

    .card-front {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 1.5rem;
      color: #6b6b80;
      transition: all 0.2s ease;
    }

    .card:hover .card-front {
      background: rgba(236,72,153,0.1);
      border-color: rgba(236,72,153,0.3);
      box-shadow: 0 0 15px rgba(236,72,153,0.15);
    }

    .card-back {
      background: linear-gradient(135deg, rgba(236,72,153,0.15), rgba(139,92,246,0.15));
      border: 1px solid rgba(236,72,153,0.2);
      transform: rotateY(180deg);
    }

    .card.matched .card-back {
      background: rgba(34,197,94,0.15);
      border-color: rgba(34,197,94,0.3);
      box-shadow: 0 0 15px rgba(34,197,94,0.2);
    }

    /* Win overlay */
    .win-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,26,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: overlay-in 0.4s ease;
    }

    @keyframes overlay-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .win-overlay h2 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #22c55e, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .win-overlay .win-stats {
      font-size: 1.1rem;
      color: #a1a1b5;
      margin-bottom: 1.5rem;
      text-align: center;
      line-height: 2;
    }

    .win-overlay button {
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      color: #fff;
      border: none;
      box-shadow: 0 4px 15px rgba(139,92,246,0.3);
    }

    .win-overlay button:hover {
      transform: scale(1.05);
    }

    .hidden { display: none !important; }

    @media (max-width: 400px) {
      .card-face { font-size: 1.5rem; }
      .board { gap: 6px; padding: 10px; }
    }
  </style>
</head>
<body>
  <h1>🃏 Memory Match</h1>

  <div class="controls">
    <select id="difficulty">
      <option value="easy">🟢 Easy (4×4)</option>
      <option value="medium">🟡 Medium (4×5)</option>
      <option value="hard">🔴 Hard (5×6)</option>
    </select>
    <button onclick="startGame()">🔁 New Game</button>
  </div>

  <div class="stats">
    <span>Moves: <span id="moves">0</span></span>
    <span>Pairs: <span id="pairs">0</span>/<span id="totalPairs">8</span></span>
    <span>Time: <span id="timer">0:00</span></span>
  </div>

  <div class="board cols-4" id="board"></div>

  <script>
    const boardEl = document.getElementById('board');
    const movesEl = document.getElementById('moves');
    const pairsEl = document.getElementById('pairs');
    const totalPairsEl = document.getElementById('totalPairs');
    const timerEl = document.getElementById('timer');
    const difficultySelect = document.getElementById('difficulty');

    const EMOJIS = ['🎮','🎯','🎲','🎨','🎵','🎭','🏆','⭐','🔥','💎','🌈','🦄','🍕','🚀','🌙'];

    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let totalPairsCount = 0;
    let moves = 0;
    let timerInterval = null;
    let seconds = 0;
    let locked = false;

    const CONFIGS = {
      easy:   { cols: 4, rows: 4, pairs: 8 },
      medium: { cols: 5, rows: 4, pairs: 10 },
      hard:   { cols: 6, rows: 5, pairs: 15 }
    };

    function startGame() {
      clearInterval(timerInterval);
      seconds = 0;
      moves = 0;
      matchedPairs = 0;
      flippedCards = [];
      locked = false;

      const config = CONFIGS[difficultySelect.value];
      totalPairsCount = config.pairs;

      movesEl.textContent = '0';
      pairsEl.textContent = '0';
      totalPairsEl.textContent = totalPairsCount;
      timerEl.textContent = '0:00';

      // Set grid columns
      boardEl.className = `board cols-${config.cols}`;

      // Pick random emojis
      const selectedEmojis = [...EMOJIS].sort(() => Math.random() - 0.5).slice(0, config.pairs);
      const deck = [...selectedEmojis, ...selectedEmojis].sort(() => Math.random() - 0.5);

      boardEl.innerHTML = '';
      cards = [];

      deck.forEach((emoji, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.emoji = emoji;
        card.dataset.index = index;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-front">?</div>
            <div class="card-face card-back">${emoji}</div>
          </div>
        `;
        card.addEventListener('click', () => flipCard(card));
        boardEl.appendChild(card);
        cards.push(card);
      });

      // Start timer on first click
      timerInterval = null;
    }

    function flipCard(card) {
      if (locked) return;
      if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
      if (flippedCards.length >= 2) return;

      // Start timer on first move
      if (!timerInterval && moves === 0) {
        timerInterval = setInterval(() => {
          seconds++;
          const mins = Math.floor(seconds / 60);
          const secs = seconds % 60;
          timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
      }

      card.classList.add('flipped');
      flippedCards.push(card);

      if (flippedCards.length === 2) {
        moves++;
        movesEl.textContent = moves;
        locked = true;

        const [card1, card2] = flippedCards;

        if (card1.dataset.emoji === card2.dataset.emoji) {
          // Match!
          setTimeout(() => {
            card1.classList.add('matched');
            card2.classList.add('matched');
            matchedPairs++;
            pairsEl.textContent = matchedPairs;
            flippedCards = [];
            locked = false;

            if (matchedPairs === totalPairsCount) {
              clearInterval(timerInterval);
              showWin();
            }
          }, 400);
        } else {
          // No match
          setTimeout(() => {
            card1.classList.remove('flipped');
            card2.classList.remove('flipped');
            flippedCards = [];
            locked = false;
          }, 800);
        }
      }
    }

    function showWin() {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;

      const overlay = document.createElement('div');
      overlay.className = 'win-overlay';
      overlay.innerHTML = `
        <h2>🎉 You Won!</h2>
        <div class="win-stats">
          Moves: ${moves}<br>
          Time: ${timeStr}<br>
          Pairs: ${totalPairsCount}
        </div>
        <button onclick="this.parentElement.remove(); startGame();">🔁 Play Again</button>
      `;
      document.body.appendChild(overlay);
    }

    startGame();
  </script>
</body>
</html>
