<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Guess — Hex Color Challenge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.3;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }
    .bg-orb--1 { width: 400px; height: 400px; background: #8b5cf6; top: -100px; left: -100px; }
    .bg-orb--2 { width: 300px; height: 300px; background: #06b6d4; bottom: -80px; right: -80px; animation-delay: -4s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .game-container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 500px;
      width: 90%;
    }

    h1 {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 24px;
    }

    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 900;
      color: #8b5cf6;
    }
    .stat-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .color-display {
      width: 180px;
      height: 180px;
      border-radius: 24px;
      margin: 0 auto 32px;
      box-shadow: 0 0 60px rgba(139,92,246,0.3);
      transition: background-color 0.4s, transform 0.3s;
      cursor: default;
      border: 3px solid rgba(255,255,255,0.1);
    }

    .color-display:hover {
      transform: scale(1.05);
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .option-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.1);
      color: #fff;
      font-family: 'Inter', monospace;
      font-size: 1rem;
      font-weight: 700;
      padding: 16px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 1px;
    }
    .option-btn:hover {
      background: rgba(139,92,246,0.2);
      border-color: #8b5cf6;
      transform: translateY(-2px);
    }
    .option-btn.correct {
      background: rgba(34,197,94,0.3);
      border-color: #22c55e;
      animation: pulse 0.5s;
    }
    .option-btn.wrong {
      background: rgba(239,68,68,0.3);
      border-color: #ef4444;
      animation: shake 0.4s;
    }
    .option-btn:disabled {
      cursor: default;
      opacity: 0.7;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .message {
      font-size: 1.1rem;
      font-weight: 700;
      min-height: 32px;
      margin-bottom: 16px;
      transition: opacity 0.3s;
    }

    .streak-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .streak-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4);
      border-radius: 3px;
      transition: width 0.5s;
    }

    .game-over-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    .game-over-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .game-over-overlay h2 {
      font-size: 2.5rem;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .game-over-overlay p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
    }
    .restart-btn {
      margin-top: 20px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .restart-btn:hover { transform: scale(1.05); }

    .lives {
      font-size: 1.4rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>

  <div class="game-container">
    <h1>🎨 Color Guess</h1>
    <p class="subtitle">Which hex code matches the color?</p>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-value" id="score">0</div>
        <div class="stat-label">Score</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="best">0</div>
        <div class="stat-label">Best</div>
      </div>
    </div>

    <div class="lives" id="lives">❤️ ❤️ ❤️</div>

    <div class="color-display" id="color-display"></div>

    <div class="streak-bar"><div class="streak-fill" id="streak-fill" style="width:0%"></div></div>

    <div class="options-grid" id="options"></div>

    <div class="message" id="message"></div>
  </div>

  <div class="game-over-overlay" id="game-over">
    <h2>Game Over!</h2>
    <p>Final Score: <strong id="final-score">0</strong></p>
    <p>Best Streak: <strong id="final-streak">0</strong></p>
    <button class="restart-btn" onclick="restartGame()">Play Again</button>
  </div>

  <script>
    let score = 0, streak = 0, bestStreak = 0, lives = 3, round = 0;

    function randomHex() {
      return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0').toUpperCase();
    }

    function similarColor(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      const vary = () => Math.max(0, Math.min(255, Math.floor(Math.random()*120 - 60)));
      return '#' + [
        Math.max(0,Math.min(255, r + vary())).toString(16).padStart(2,'0'),
        Math.max(0,Math.min(255, g + vary())).toString(16).padStart(2,'0'),
        Math.max(0,Math.min(255, b + vary())).toString(16).padStart(2,'0')
      ].join('').toUpperCase();
    }

    function updateUI() {
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak;
      document.getElementById('best').textContent = bestStreak;
      document.getElementById('streak-fill').style.width = Math.min(streak*10, 100) + '%';
      const hearts = Array(3).fill('').map((_,i) => i < lives ? '❤️' : '🖤').join(' ');
      document.getElementById('lives').textContent = hearts;
    }

    function newRound() {
      round++;
      const correct = randomHex();
      document.getElementById('color-display').style.backgroundColor = correct;
      document.getElementById('message').textContent = '';

      const options = [correct];
      while (options.length < 4) {
        const fake = similarColor(correct);
        if (!options.includes(fake)) options.push(fake);
      }

      // Shuffle
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i+1));
        [options[i], options[j]] = [options[j], options[i]];
      }

      const container = document.getElementById('options');
      container.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => handleGuess(btn, opt, correct);
        container.appendChild(btn);
      });
    }

    function handleGuess(btn, guess, correct) {
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(b => b.disabled = true);

      if (guess === correct) {
        btn.classList.add('correct');
        score += 10 + streak * 2;
        streak++;
        bestStreak = Math.max(bestStreak, streak);
        document.getElementById('message').textContent = '✅ Correct!';
        document.getElementById('message').style.color = '#22c55e';
      } else {
        btn.classList.add('wrong');
        buttons.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
        streak = 0;
        lives--;
        document.getElementById('message').textContent = '❌ Wrong! It was ' + correct;
        document.getElementById('message').style.color = '#ef4444';
      }

      updateUI();

      if (lives <= 0) {
        setTimeout(showGameOver, 800);
      } else {
        setTimeout(newRound, 1200);
      }
    }

    function showGameOver() {
      document.getElementById('final-score').textContent = score;
      document.getElementById('final-streak').textContent = bestStreak;
      document.getElementById('game-over').classList.add('visible');
    }

    function restartGame() {
      score = 0; streak = 0; bestStreak = 0; lives = 3; round = 0;
      document.getElementById('game-over').classList.remove('visible');
      updateUI();
      newRound();
    }

    updateUI();
    newRound();
  </script>
</body>
</html>
